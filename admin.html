<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서울 클린맵 관리자</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }

    /* 로그인 */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: white; border-radius: 16px; padding: 40px 32px;
      width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .login-box h1 { font-size: 20px; margin-bottom: 6px; }
    .login-box p { font-size: 13px; color: #888; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; margin-bottom: 10px;
    }
    .login-box input:focus { outline: none; border-color: #2e7d52; }
    .login-btn {
      width: 100%; padding: 12px; background: #2e7d52; color: white;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .login-btn:hover { background: #256644; }
    .login-error { color: #e53935; font-size: 13px; margin-top: 8px; }

    /* 어드민 */
    #admin-screen { display: none; min-height: 100vh; }
    header {
      background: #2e7d52; color: white;
      padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 16px; font-weight: 700; }
    .logout-btn {
      background: rgba(255,255,255,0.2); border: none; color: white;
      padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.3); }

    /* 탭 */
    .tabs { background: white; border-bottom: 1px solid #e0e0e0; display: flex; padding: 0 24px; }
    .tab {
      padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
      border-bottom: 3px solid transparent; color: #888;
    }
    .tab.active { color: #2e7d52; border-bottom-color: #2e7d52; }
    .badge {
      display: inline-block; background: #e53935; color: white;
      font-size: 11px; font-weight: 700; border-radius: 10px;
      padding: 1px 6px; margin-left: 6px;
    }

    /* 레이아웃 */
    .admin-body { display: flex; height: calc(100vh - 95px); }
    .list-pane {
      width: 400px; flex-shrink: 0; overflow-y: auto;
      background: white; border-right: 1px solid #e0e0e0;
    }
    .map-pane { flex: 1; }
    #admin-map { width: 100%; height: 100%; }

    /* 목록 */
    .list-empty { padding: 40px 24px; text-align: center; color: #aaa; font-size: 14px; }
    .report-item {
      padding: 14px 16px; border-bottom: 1px solid #f0f0f0;
      cursor: pointer; transition: background 0.1s;
    }
    .report-item:hover { background: #f9f9f9; }
    .report-item.selected { background: #e8f5ee; }
    .ri-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .ri-type {
      font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
    }
    .ri-type.new { background: #e3f2fd; color: #1565c0; }
    .ri-type.error { background: #fce4ec; color: #c62828; }
    .ri-time { font-size: 11px; color: #aaa; }
    .ri-label { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .ri-sub { font-size: 12px; color: #888; }
    .ri-memo { font-size: 12px; color: #555; margin-top: 4px; padding: 6px 8px; background: #f5f5f5; border-radius: 6px; }

    /* 상세 액션 */
    .detail-pane {
      position: absolute; bottom: 20px; right: 20px;
      background: white; border-radius: 14px; padding: 16px 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15); min-width: 280px; z-index: 1000;
    }
    .detail-pane h3 { font-size: 14px; margin-bottom: 12px; color: #333; }
    .action-row { display: flex; gap: 8px; }
    .btn-approve {
      flex: 1; padding: 10px; background: #2e7d52; color: white;
      border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .btn-approve:hover { background: #256644; }
    .btn-reject {
      flex: 1; padding: 10px; background: white; color: #e53935;
      border: 2px solid #e53935; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .btn-reject:hover { background: #fce4ec; }
    .detail-info { font-size: 12px; color: #666; margin-bottom: 12px; line-height: 1.7; }

    /* 검수 탭 */
    .rv-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .rv-bad     { background: #ffebee; color: #c62828; }
    .rv-suspect { background: #fff3e0; color: #e65100; }
    .rv-filter  { padding: 10px 14px; border-bottom: 1px solid #eee; display: flex; gap: 8px; }
    .rv-filter-btn { padding: 4px 10px; border-radius: 16px; font-size: 12px; border: 1px solid #ddd; background: white; cursor: pointer; }
    .rv-filter-btn.active { background: #2e7d52; color: white; border-color: #2e7d52; }
    .rv-links { margin: 8px 0; display: flex; gap: 8px; flex-wrap: wrap; }
    .rv-link { font-size: 12px; color: #1565c0; text-decoration: none; padding: 4px 8px; border: 1px solid #1565c0; border-radius: 6px; }
    .rv-link:hover { background: #e3f2fd; }
    .rv-input-wrap { margin-top: 10px; }
    .rv-input-wrap label { font-size: 12px; font-weight: 600; color: #555; display: block; margin-bottom: 4px; }
    .rv-input-row { display: flex; gap: 6px; }
    .rv-input-row input { flex: 1; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }
    .rv-input-row input:focus { outline: none; border-color: #2e7d52; }
    .rv-submit-btn { padding: 8px 14px; background: #2e7d52; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .rv-msg { font-size: 12px; margin-top: 6px; min-height: 16px; }
    .rv-msg.ok { color: #2e7d52; } .rv-msg.err { color: #e53935; }
    .item-done { opacity: 0.35; }
    /* 핀 검색 탭 */
    .ps-search-wrap { padding: 12px 14px; border-bottom: 1px solid #eee; }
    .ps-search-wrap input { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }
    .ps-search-wrap input:focus { outline: none; border-color: #2e7d52; }
    .ps-hint { padding: 40px 24px; text-align: center; color: #aaa; font-size: 13px; }
    /* 설정 모달 */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 10000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: white; border-radius: 14px; padding: 24px;
      width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal-box h3 { font-size: 15px; margin-bottom: 16px; }
    .modal-box label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; }
    .modal-box input {
      width: 100%; padding: 10px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 13px; margin-bottom: 8px;
    }
    .modal-box input:focus { outline: none; border-color: #2e7d52; }
    .modal-hint { font-size: 11px; color: #888; margin-bottom: 16px; }
    .modal-row { display: flex; gap: 8px; }
    .modal-row button { flex: 1; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
    .modal-save { background: #2e7d52; color: white; }
    .modal-save:hover { background: #256644; }
    .modal-cancel { background: white; color: #666; border: 1px solid #ddd !important; }
    .modal-cancel:hover { background: #f5f5f5; }
    /* 위치 수정 UI */
    .lf-section { border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
    .lf-section label { font-size: 12px; font-weight: 600; color: #555; display: block; margin-bottom: 4px; }
    .lf-input-row { display: flex; gap: 6px; margin-bottom: 6px; }
    .lf-input-row input { flex: 1; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 12px; }
    .lf-input-row input:focus { outline: none; border-color: #1565c0; }
    .lf-preview-btn { padding: 8px 12px; background: #1565c0; color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .lf-preview-btn:hover { background: #0d47a1; }
    .lf-kko-link { font-size: 12px; color: #1565c0; text-decoration: none; padding: 3px 8px; border: 1px solid #1565c0; border-radius: 6px; display: inline-block; margin-bottom: 6px; }
    .lf-kko-link:hover { background: #e3f2fd; }
    .lf-coords { font-size: 11px; color: #2e7d52; font-weight: 600; min-height: 16px; }
    .lf-coords.err { color: #e53935; }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-box">
    <h1>🗑️ 서울 클린맵</h1>
    <p>관리자 페이지</p>
    <input type="email" id="login-email" placeholder="이메일">
    <input type="password" id="login-pw" placeholder="비밀번호">
    <button class="login-btn" id="login-btn">로그인</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- 어드민 화면 -->
<div id="admin-screen">
  <header>
    <h1>서울 클린맵 관리자</h1>
    <div style="display:flex;gap:8px;">
      <button class="logout-btn" id="settings-btn">⚙️ 설정</button>
      <button class="logout-btn" id="logout-btn">로그아웃</button>
    </div>
  </header>
  <div class="tabs">
    <div class="tab active" data-tab="submissions">
      신규 제보 <span class="badge" id="badge-submissions">0</span>
    </div>
    <div class="tab" data-tab="error_reports">
      오류 제보 <span class="badge" id="badge-errors">0</span>
    </div>
    <div class="tab" data-tab="review">
      좌표 검수 <span class="badge" id="badge-review" style="background:#e65100;">0</span>
    </div>
    <div class="tab" data-tab="pin-search">
      핀 수정
    </div>
    <div class="tab" data-tab="correction-log">
      전체 핀 <span class="badge" id="badge-corrections" style="background:#607d8b;">0</span>
    </div>
    <div style="margin-left:auto;display:flex;gap:6px;align-items:center;margin-right:8px;">
      <button id="claude-copy-btn" style="padding:5px 12px;background:#1a3a2a;color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;">📋 수정 요청 복사 <span id="pending-badge" style="display:none;background:#e65100;color:white;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:3px;">0</span></button>
      <button id="pending-done-btn" style="display:none;padding:5px 12px;background:#e65100;color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;">✅ 전체 완료</button>
    </div>
  </div>
  <div class="admin-body">
    <div class="list-pane" id="list-pane">
      <div class="list-empty">로딩 중...</div>
    </div>
    <div class="map-pane" style="position:relative;">
      <div id="admin-map"></div>
      <div class="detail-pane" id="detail-pane" style="display:none;">
        <h3 id="detail-title"></h3>
        <div class="detail-info" id="detail-info"></div>
        <!-- 위치 수정 UI (오류 제보 - 위치 오류 시) -->
        <div id="location-fix-ui" style="display:none;" class="lf-section">
          <a id="lf-kko-link" class="lf-kko-link" href="#" target="_blank" style="display:none;">제보된 kko.to 링크 열기</a>
          <label>정확한 위치 Kakao URL 붙여넣기</label>
          <div class="lf-input-row">
            <input type="url" id="lf-kakao-url" placeholder="kko.to 열면 리다이렉트되는 카카오 URL...">
            <button class="lf-preview-btn" id="lf-preview-btn">미리보기</button>
          </div>
          <div class="lf-coords" id="lf-coords"></div>
        </div>
        <!-- 신규/오류 제보 액션 -->
        <div id="report-actions">
          <div class="action-row">
            <button class="btn-approve" id="btn-approve">✅ 승인</button>
            <button class="btn-reject" id="btn-reject">❌ 반려</button>
          </div>
          <div id="approve-status" style="font-size:12px;color:#2e7d52;margin-top:6px;min-height:16px;"></div>

        <!-- 수정 이력 표시 (전체 핀 탭) -->
        <div id="log-actions" style="display:none;">
          <div id="log-history"></div>
          <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;">
            <a id="log-map-link" href="#" target="_blank" class="rv-link">지도에서 보기</a>
            <a id="log-roadview-link" href="#" target="_blank" class="rv-link">카카오 로드뷰</a>
            <a id="log-deploy-link" href="#" target="_blank" class="rv-link" style="background:#2e7d52;color:white;border-color:#2e7d52;">배포 페이지</a>
          </div>

            <label>수정 예약 (kko.to)</label>
            <div class="lf-input-row">
              <input type="url" id="log-kko-input" placeholder="https://kko.to/...">
              <button class="lf-preview-btn" id="log-reserve-btn" style="background:#e65100;">예약</button>
            </div>
            <div id="log-pending-msg" style="font-size:11px;margin-top:4px;min-height:14px;"></div>
          </div>
          <div id="log-single-done-wrap" style="display:none;margin-top:8px;">
            <button id="log-single-done-btn" style="width:100%;padding:9px;background:#e65100;color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">✅ 이 핀 완료 처리</button>
          </div>

        <div id="review-actions" style="display:none;">
          <div class="rv-links">
            <a class="rv-link" id="rv-cur-link" href="#" target="_blank">📍 현재 위치</a>
            <a class="rv-link" id="rv-kakao-link" href="#" target="_blank">🔵 카카오 비교</a>
          </div>
          <div class="rv-input-wrap">
            <label>정확한 위치의 kko.to 링크</label>
            <div class="rv-input-row">
              <input type="url" id="rv-kko-input" placeholder="https://kko.to/...">
              <button class="rv-submit-btn" id="rv-submit-btn">제출</button>

<!-- 설정 모달 -->
<div id="settings-modal" class="modal-overlay">
  <div class="modal-box">
    <h3>⚙️ 설정</h3>
    <label>GitHub Personal Access Token</label>
    <input type="password" id="settings-pat" placeholder="ghp_...">
    <div class="modal-hint">GitHub → Settings → Developer settings → Personal access tokens (Classic)<br>필요 권한: <strong>repo</strong> (Contents write)</div>
    <div id="settings-pat-status" style="font-size:12px;margin-bottom:12px;"></div>
    <div class="modal-row">
      <button class="modal-save" id="settings-save-btn">저장</button>
      <button class="modal-cancel" id="settings-cancel-btn">취소</button>
    </div>
  </div>
</div>

<script>
  firebase.initializeApp({
    apiKey: "AIzaSyCIZaB3qkNGcW-HVkRszAehjzvvs7Eb52E",
    authDomain: "seoul-cleanmap.firebaseapp.com",
    projectId: "seoul-cleanmap",
    storageBucket: "seoul-cleanmap.firebasestorage.app",
    messagingSenderId: "48323704997",
    appId: "1:48323704997:web:1ca7ba27b735be3873f54c"
  });
  const db   = firebase.firestore();
  const auth = firebase.auth();

  // ── 좌표 변환 (WCONGNAMUL → WGS84) ──────────────────────
  proj4.defs('EPSG:5181',
    '+proj=tmerc +lat_0=38 +lon_0=127 +k=1 +x_0=200000 +y_0=500000 +ellps=GRS80 +units=m +no_defs');

  function wcToWgs(urlX, urlY) {
    // WCONGNAMUL = EPSG:5181 × 2.5
    const [lon, lat] = proj4('EPSG:5181', 'WGS84', [urlX / 2.5, urlY / 2.5]);
    return { lat, lon };
  }

  function parseKakaoUrl(url) {
    try {
      // urlX/urlY 파라미터 (WCONGNAMUL 좌표계)
      const mx = url.match(/[?&]urlX=(\d+\.?\d*)/);
      const my = url.match(/[?&]urlY=(\d+\.?\d*)/);
      if (mx && my) return wcToWgs(parseFloat(mx[1]), parseFloat(my[1]));
      // /roadview/lat,lon 형식
      const rm = url.match(/\/roadview\/(-?\d+\.?\d+),(-?\d+\.?\d+)/);
      if (rm) return { lat: parseFloat(rm[1]), lon: parseFloat(rm[2]) };
      // ,lat,lon 형식 (map link)
      const mm = url.match(/,(-?\d{2}\.\d+),(-?\d{3}\.\d+)/);
      if (mm) return { lat: parseFloat(mm[1]), lon: parseFloat(mm[2]) };
    } catch(e) {}
    return null;
  }

  // ── GitHub API ────────────────────────────────────────────
  const GITHUB_REPO = 'seoul-cleanmap/seoul-cleanmap.github.io';

  async function applyGitHubUpdate(pinId, newLat, newLon) {
    const pat = sessionStorage.getItem('github_pat');
    if (!pat) throw new Error('GitHub PAT가 설정되지 않았습니다. (⚙️ 설정 버튼)');

    const headers = {
      Authorization: `token ${pat}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    };

    // 1. 현재 data.json 조회
    const res = await fetch(
      `https://api.github.com/repos/${GITHUB_REPO}/contents/data.json`, { headers });
    if (!res.ok) throw new Error(`data.json 조회 실패 (${res.status})`);
    const fileInfo = await res.json();

    // 2. 디코딩 및 핀 수정
    const raw = atob(fileInfo.content.replace(/\s/g, ''));
    const data = JSON.parse(raw);
    const pin = data.find(p => String(p.id) === String(pinId));
    if (!pin) throw new Error(`핀 No.${pinId}를 data.json에서 찾을 수 없습니다.`);

    const oldLat = pin.lat, oldLon = pin.lon;
    pin.lat = newLat;
    pin.lon = newLon;
    pin.geocode = 'manual';

    // 3. 수정 후 커밋
    const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const putRes = await fetch(
      `https://api.github.com/repos/${GITHUB_REPO}/contents/data.json`, {
        method: 'PUT', headers,
        body: JSON.stringify({
          message: `좌표 수정: No.${pinId} 오류제보 승인 (${oldLat.toFixed(6)},${oldLon.toFixed(6)} → ${newLat.toFixed(6)},${newLon.toFixed(6)})`,
          content: newContent,
          sha: fileInfo.sha
        })
      });
    if (!putRes.ok) {
      const err = await putRes.json().catch(() => ({}));
      throw new Error(`GitHub 업데이트 실패: ${putRes.status} ${err.message || ''}`);
    }
  }

  // ── 로그인 ──
  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const pw    = document.getElementById('login-pw').value;
    document.getElementById('login-error').textContent = '';
    try {
      await auth.signInWithEmailAndPassword(email, pw);
    } catch (e) {
      document.getElementById('login-error').textContent = '로그인 실패: ' + e.message;
    }
  });

  document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());

  auth.onAuthStateChanged(user => {
    document.getElementById('login-screen').style.display = user ? 'none' : 'flex';
    document.getElementById('admin-screen').style.display = user ? 'block' : 'none';
    if (user) initAdmin();
  });

  // ── 설정 모달 ────────────────────────────────────────────
  function openSettings() {
    const modal = document.getElementById('settings-modal');
    const patInput = document.getElementById('settings-pat');
    const status = document.getElementById('settings-pat-status');
    const saved = sessionStorage.getItem('github_pat');
    patInput.value = saved ? '••••••••••••••••' : '';
    status.textContent = saved ? '✅ PAT 저장됨' : '⚠️ PAT 미설정';
    status.style.color = saved ? '#2e7d52' : '#e65100';
    modal.classList.add('open');
  }
  document.getElementById('settings-btn').addEventListener('click', openSettings);
  document.getElementById('settings-cancel-btn').addEventListener('click', () => {
    document.getElementById('settings-modal').classList.remove('open');
  });
  document.getElementById('settings-save-btn').addEventListener('click', () => {
    const val = document.getElementById('settings-pat').value.trim();
    if (val && !val.startsWith('•')) {
      sessionStorage.setItem('github_pat', val);
      const status = document.getElementById('settings-pat-status');
      status.textContent = '✅ 저장됨';
      status.style.color = '#2e7d52';
      setTimeout(() => document.getElementById('settings-modal').classList.remove('open'), 800);
    } else {
      document.getElementById('settings-modal').classList.remove('open');
    }
  });

  // ── 지도 초기화 ──
  let adminMap, markerCur, markerRef, markerCorrect;
  function initMap() {
    if (adminMap) return;
    adminMap = L.map('admin-map').setView([37.555, 126.98], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO', maxZoom: 19
    }).addTo(adminMap);
  }

  // ── 어드민 초기화 ──
  let currentTab = 'submissions';
  let selectedId = null;
  let allItems   = [];

  function initAdmin() {
    setTimeout(() => { initMap(); }, 100);
    loadTab('submissions');

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        selectedId = null;
        document.getElementById('detail-pane').style.display = 'none';
        if (currentTab === 'review') {
          loadReview();
        } else if (currentTab === 'pin-search') {
          loadPinSearch();
        } else if (currentTab === 'correction-log') {
          loadCorrectionLog();
        } else {
          document.getElementById('report-actions').style.display = 'block';
          document.getElementById('review-actions').style.display = 'none';
          loadTab(currentTab);
        }
      });
    });
  }

  function loadTab(col) {
    document.getElementById('list-pane').innerHTML = '<div class="list-empty">로딩 중...</div>';
    db.collection(col).where('status', '==', 'pending').get()
      .then(snap => {
        allItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        allItems.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        const badgeId = col === 'submissions' ? 'badge-submissions' : 'badge-errors';
        document.getElementById(badgeId).textContent = allItems.length;
        renderList(allItems, col);
      })
      .catch(e => {
        document.getElementById('list-pane').innerHTML =
          `<div class="list-empty" style="color:#e53935;">로드 실패<br><small>${e.message}</small></div>`;
      });
  }

  function fmtTime(ts) {
    if (!ts) return '';
    const d = ts.toDate();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function renderList(items, col) {
    const pane = document.getElementById('list-pane');
    if (!items.length) {
      pane.innerHTML = '<div class="list-empty">대기 중인 제보가 없습니다.</div>';
      return;
    }
    pane.innerHTML = '';
    items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'report-item' + (item.id === selectedId ? ' selected' : '');
      const isNew = col === 'submissions';
      const label = isNew
        ? `📍 ${item.lat?.toFixed(5)}, ${item.lon?.toFixed(5)}`
        : `No.${item.pinId} · ${item.pinLabel} (${item.district})`;
      const sub = isNew
        ? `제보자: ${item.nickname || '익명'}`
        : `${item.errorType} · ${item.nickname || '익명'}`;
      div.innerHTML = `
        <div class="ri-header">
          <span class="ri-type ${isNew ? 'new' : 'error'}">${isNew ? '신규 제보' : '오류 제보'}</span>
          <span class="ri-time">${fmtTime(item.createdAt)}</span>
        </div>
        <div class="ri-label">${label}</div>
        <div class="ri-sub">${sub}</div>
        ${item.memo ? `<div class="ri-memo">${item.memo}</div>` : ''}`;
      div.addEventListener('click', () => selectItem(item, col));
      pane.appendChild(div);
    });
  }

  let correctedCoords = null; // 위치 오류 수정 좌표

  function selectItem(item, col) {
    selectedId = item.id;
    correctedCoords = null;
    renderList(allItems, col);

    if (markerCur)     { adminMap.removeLayer(markerCur);     markerCur = null; }
    if (markerRef)     { adminMap.removeLayer(markerRef);     markerRef = null; }
    if (markerCorrect) { adminMap.removeLayer(markerCorrect); markerCorrect = null; }

    const isNew = col === 'submissions';
    const isLocationError = !isNew && item.errorType && item.errorType.includes('위치');

    if (isNew) {
      markerCur = L.marker([item.lat, item.lon], {
        icon: L.divIcon({ html: '<div style="width:14px;height:14px;background:#1565c0;border:2px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>', className: '', iconSize:[14,14], iconAnchor:[7,7] })
      }).addTo(adminMap).bindPopup(`신규 제보<br>${item.nickname || '익명'}`).openPopup();
      adminMap.setView([item.lat, item.lon], 17);
    } else {
      if (item.lat && item.lon) {
        markerRef = L.marker([item.lat, item.lon], {
          icon: L.divIcon({ html: '<div style="width:14px;height:14px;background:#e53935;border:2px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>', className: '', iconSize:[14,14], iconAnchor:[7,7] })
        }).addTo(adminMap).bindPopup(`현재 위치<br>No.${item.pinId} · ${item.pinLabel}`).openPopup();
        adminMap.setView([item.lat, item.lon], 17);
      }
    }

    const detailPane = document.getElementById('detail-pane');
    document.getElementById('detail-title').textContent = isNew ? '신규 제보 검토' : '오류 제보 검토';
    document.getElementById('detail-info').innerHTML = isNew
      ? `위치: ${item.lat?.toFixed(6)}, ${item.lon?.toFixed(6)}<br>제보자: ${item.nickname || '익명'}<br>${item.memo ? '메모: ' + item.memo : ''}`
      : `핀: No.${item.pinId} · ${item.pinLabel}<br>오류유형: ${item.errorType}<br>제보자: ${item.nickname || '익명'}<br>${item.memo ? '메모: ' + item.memo : ''}`;

    // 위치 수정 UI 설정
    const lfUi = document.getElementById('location-fix-ui');
    if (isLocationError) {
      lfUi.style.display = 'block';
      document.getElementById('lf-kakao-url').value = '';
      document.getElementById('lf-coords').textContent = '';
      // 제보자가 kko.to를 함께 제출했으면 링크 표시
      const kkoLink = document.getElementById('lf-kko-link');
      if (item.kkoTo) {
        kkoLink.href = item.kkoTo;
        kkoLink.style.display = 'inline-block';
      } else {
        kkoLink.style.display = 'none';
      }
    } else {
      lfUi.style.display = 'none';
    }

    document.getElementById('approve-status').textContent = '';
    detailPane.style.display = 'block';

    // 미리보기 버튼
    document.getElementById('lf-preview-btn').onclick = () => {
      const url = document.getElementById('lf-kakao-url').value.trim();
      const coordsEl = document.getElementById('lf-coords');
      if (!url) { coordsEl.className = 'lf-coords err'; coordsEl.textContent = 'URL을 입력해주세요.'; return; }
      const coords = parseKakaoUrl(url);
      if (!coords) {
        coordsEl.className = 'lf-coords err';
        coordsEl.textContent = 'URL에서 좌표를 찾을 수 없습니다.';
        correctedCoords = null;
        return;
      }
      correctedCoords = coords;
      coordsEl.className = 'lf-coords';
      coordsEl.textContent = `→ ${coords.lat.toFixed(6)}, ${coords.lon.toFixed(6)}`;
      // 파란 마커 표시
      if (markerCorrect) { adminMap.removeLayer(markerCorrect); markerCorrect = null; }
      markerCorrect = L.marker([coords.lat, coords.lon], {
        icon: L.divIcon({ html: '<div style="width:14px;height:14px;background:#1565c0;border:2px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>', className:'', iconSize:[14,14], iconAnchor:[7,7] })
      }).addTo(adminMap).bindPopup('수정 위치').openPopup();
      if (markerRef) {
        adminMap.fitBounds([[item.lat, item.lon],[coords.lat, coords.lon]], { padding: [40, 40] });
      } else {
        adminMap.setView([coords.lat, coords.lon], 17);
      }
    };

    // 승인 버튼
    document.getElementById('btn-approve').onclick = async () => {
      const statusEl = document.getElementById('approve-status');
      if (isLocationError) {
        if (!correctedCoords) {
          statusEl.style.color = '#e53935';
          statusEl.textContent = '먼저 URL을 붙여넣고 미리보기를 확인해주세요.';
          return;
        }
        const pat = sessionStorage.getItem('github_pat');
        if (!pat) {
          statusEl.style.color = '#e53935';
          statusEl.textContent = '⚙️ 설정에서 GitHub PAT를 먼저 입력해주세요.';
          return;
        }
        const btn = document.getElementById('btn-approve');
        btn.disabled = true;
        btn.textContent = '업데이트 중...';
        statusEl.style.color = '#2e7d52';
        statusEl.textContent = 'data.json 업데이트 중...';
        try {
          await applyGitHubUpdate(item.pinId, correctedCoords.lat, correctedCoords.lon);
          statusEl.textContent = '✅ data.json 업데이트 완료! Firestore 처리 중...';
          // 수정 이력 로그 저장
          await db.collection('pin_corrections').add({
            pinId: String(item.pinId),
            pinLabel: item.pinLabel || '',
            district: item.district || '',
            road: item.road || '',
            oldLat: item.lat || null,
            oldLon: item.lon || null,
            newLat: correctedCoords.lat,
            newLon: correctedCoords.lon,
            kkoTo: document.getElementById('lf-kakao-url').value.trim() || null,
            note: '오류제보 승인',
            correctedAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          await db.collection(col).doc(item.id).update({ status: 'approved' });
          document.getElementById('detail-pane').style.display = 'none';
          selectedId = null;
          loadTab(col);
        } catch(e) {
          statusEl.style.color = '#e53935';
          statusEl.textContent = '오류: ' + e.message;
          btn.disabled = false;
          btn.textContent = '✅ 승인';
        }
      } else {
        await db.collection(col).doc(item.id).update({ status: 'approved' });
        document.getElementById('detail-pane').style.display = 'none';
        selectedId = null;
        loadTab(col);
      }
    };

    document.getElementById('btn-reject').onclick = () => updateStatus(item.id, col, 'rejected');
  }

  async function updateStatus(id, col, status) {
    await db.collection(col).doc(id).update({ status });
    document.getElementById('detail-pane').style.display = 'none';
    selectedId = null;
    loadTab(col);
  }

  // ── 좌표 검수 탭 ──────────────────────────────────────
  let reviewItems = [];
  let reviewFilter = 'BAD';
  let doneIds = new Set();
  let markerKakao = null;

  async function loadReview() {
    document.getElementById('list-pane').innerHTML = '<div class="list-empty">로딩 중...</div>';
    // Firestore 제출 이력 (컬렉션 없어도 무시)
    try {
      const snap = await db.collection('coord_reviews').get();
      doneIds = new Set(snap.docs.map(d => d.data().pinId));
    } catch(e) { doneIds = new Set(); }

    // review_data.json — 배포 URL 기준 절대 경로로 시도
    try {
      const base = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
        ? '' : '';
      const res = await fetch(base + '/review_data.json');
      if (!res.ok) throw new Error(res.status);
      reviewItems = await res.json();
    } catch(e) {
      document.getElementById('list-pane').innerHTML =
        `<div class="list-empty" style="color:#e53935;">review_data.json 로드 실패<br><small>${e}</small></div>`;
      return;
    }
    document.getElementById('badge-review').textContent =
      reviewItems.filter(r => r.status === 'BAD' && !doneIds.has(r.id)).length;
    renderReview();
  }

  function renderReview() {
    const pane = document.getElementById('list-pane');
    const filtered = reviewItems.filter(r =>
      reviewFilter === 'ALL' ? true : r.status === reviewFilter
    );
    pane.innerHTML = `
      <div class="rv-filter">
        <button class="rv-filter-btn ${reviewFilter==='BAD'?'active':''}" data-f="BAD">BAD ${reviewItems.filter(r=>r.status==='BAD').length}</button>
        <button class="rv-filter-btn ${reviewFilter==='SUSPECT'?'active':''}" data-f="SUSPECT">SUSPECT ${reviewItems.filter(r=>r.status==='SUSPECT').length}</button>
        <button class="rv-filter-btn ${reviewFilter==='ALL'?'active':''}" data-f="ALL">전체</button>
      </div>`;
    pane.querySelectorAll('.rv-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { reviewFilter = btn.dataset.f; renderReview(); });
    });
    if (!filtered.length) {
      pane.innerHTML += '<div class="list-empty">항목이 없습니다.</div>';
      return;
    }
    filtered.forEach(item => {
      const done = doneIds.has(item.id);
      const div = document.createElement('div');
      div.className = 'report-item' + (item.id === selectedId ? ' selected' : '') + (done ? ' item-done' : '');
      div.innerHTML = `
        <div class="ri-header">
          <span class="rv-badge rv-${item.status.toLowerCase()}">${item.status}</span>
          <span class="ri-time">${item.dist_m ? Math.round(item.dist_m).toLocaleString()+'m 오차' : '미검증'}</span>
        </div>
        <div class="ri-label">No.${item.id} · ${item.label}</div>
        <div class="ri-sub">${item.district} · ${item.road}</div>
        ${done ? '<div style="font-size:11px;color:#2e7d52;margin-top:3px;">✅ 제출됨</div>' : ''}`;
      div.addEventListener('click', () => selectReviewItem(item));
      pane.appendChild(div);
    });
  }

  function selectReviewItem(item) {
    selectedId = item.id;
    renderReview();

    if (markerCur)     { adminMap.removeLayer(markerCur);     markerCur = null; }
    if (markerRef)     { adminMap.removeLayer(markerRef);     markerRef = null; }
    if (markerKakao)   { adminMap.removeLayer(markerKakao);   markerKakao = null; }
    if (markerCorrect) { adminMap.removeLayer(markerCorrect); markerCorrect = null; }

    // 현재 좌표 (빨간)
    markerCur = L.marker([item.cur_lat, item.cur_lon], {
      icon: L.divIcon({ html: '<div style="width:14px;height:14px;background:#e53935;border:2px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>', className:'', iconSize:[14,14], iconAnchor:[7,7] })
    }).addTo(adminMap).bindPopup(`현재 좌표<br>No.${item.id} · ${item.label}`).openPopup();

    // 카카오 교차검증 좌표 (파란) — 있을 때만
    if (item.kakao_lat && item.kakao_lon) {
      markerKakao = L.marker([item.kakao_lat, item.kakao_lon], {
        icon: L.divIcon({ html: '<div style="width:14px;height:14px;background:#1565c0;border:2px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>', className:'', iconSize:[14,14], iconAnchor:[7,7] })
      }).addTo(adminMap).bindPopup(`카카오 비교: ${item.kakao_name}`);
    }

    adminMap.setView([item.cur_lat, item.cur_lon], 17);

    // 상세 패널
    document.getElementById('report-actions').style.display = 'none';
    document.getElementById('review-actions').style.display = 'block';
    document.getElementById('detail-title').textContent = `No.${item.id} · ${item.label}`;
    document.getElementById('detail-info').innerHTML =
      `<span class="rv-badge rv-${item.status.toLowerCase()}">${item.status}</span> ${item.dist_m ? Math.round(item.dist_m).toLocaleString()+'m 오차' : ''}<br>` +
      `${item.district} · ${item.road}`;
    document.getElementById('rv-cur-link').href =
      `https://map.kakao.com/link/map/${encodeURIComponent(item.label)},${item.cur_lat},${item.cur_lon}`;
    document.getElementById('rv-kakao-link').href = item.kakao_lat
      ? `https://map.kakao.com/link/map/${encodeURIComponent(item.kakao_name||'카카오비교')},${item.kakao_lat},${item.kakao_lon}`
      : '#';
    document.getElementById('rv-kko-input').value = '';
    document.getElementById('rv-msg').textContent = '';
    document.getElementById('detail-pane').style.display = 'block';

    document.getElementById('rv-submit-btn').onclick = () => submitCorrection(item);
  }

  async function submitCorrection(item) {
    const kko = document.getElementById('rv-kko-input').value.trim();
    const msg = document.getElementById('rv-msg');
    if (!kko.startsWith('http')) { msg.className = 'rv-msg err'; msg.textContent = 'kko.to 링크를 입력해주세요.'; return; }
    msg.className = 'rv-msg'; msg.textContent = '제출 중...';
    await db.collection('coord_reviews').add({
      pinId: item.id || item._id, kkoTo: kko, status: 'pending',
      district: item.district, label: item.label || item._addr, road: item.road || item._road,
      curLat: item.cur_lat ?? item._lat, curLon: item.cur_lon ?? item._lon,
      submittedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    doneIds.add(item.id || item._id);
    msg.className = 'rv-msg ok'; msg.textContent = '✅ 제출 완료';
    renderReview();
  }

  // ── 핀 수정 탭 ───────────────────────────────────────
  let allPins = [];

  async function loadPinSearch() {
    const pane = document.getElementById('list-pane');
    pane.innerHTML = `
      <div class="ps-search-wrap">
        <input type="search" id="ps-input" placeholder="핀 번호(0011), 장소명, 도로명 검색...">
      </div>
      <div class="ps-hint" id="ps-hint">핀 번호 또는 장소명으로 검색하세요.</div>
      <div id="ps-results"></div>`;
    document.getElementById('report-actions').style.display = 'none';
    document.getElementById('review-actions').style.display = 'none';
    document.getElementById('detail-pane').style.display = 'none';

    if (!allPins.length) {
      try {
        const res = await fetch('/data.json');
        allPins = await res.json();
      } catch(e) {
        document.getElementById('ps-hint').textContent = 'data.json 로드 실패: ' + e;
        return;
      }
    }

    const input = document.getElementById('ps-input');
    input.addEventListener('input', () => {
      const q = input.value.trim().toLowerCase();
      if (!q) { document.getElementById('ps-results').innerHTML = ''; return; }
      const hits = allPins.filter(p =>
        (p.id && p.id.includes(q)) ||
        (p.label && p.label.toLowerCase().includes(q)) ||
        (p.road  && p.road.toLowerCase().includes(q))
      ).slice(0, 30);
      renderPinResults(hits);
    });
    input.focus();
  }

  function renderPinResults(hits) {
    const box = document.getElementById('ps-results');
    if (!hits.length) { box.innerHTML = '<div class="ps-hint">검색 결과 없음</div>'; return; }
    box.innerHTML = '';
    hits.forEach(p => {
      const div = document.createElement('div');
      div.className = 'report-item' + (p.id === selectedId ? ' selected' : '');
      div.innerHTML = `
        <div class="ri-label">No.${p.id} · ${p.label || '-'}</div>
        <div class="ri-sub">${p.district || ''} · ${p.road || ''}</div>`;
      div.addEventListener('click', () => selectPinItem(p));
      box.appendChild(div);
    });
  }

  function selectPinItem(p) {
    selectedId = p.id;
    renderPinResults(document.getElementById('ps-results').querySelectorAll('.report-item').length
      ? allPins.filter(x => document.getElementById('ps-results').querySelector(`[data-id="${x.id}"]`)) : []);

    if (markerCur)     { adminMap.removeLayer(markerCur);     markerCur = null; }
    if (markerRef)     { adminMap.removeLayer(markerRef);     markerRef = null; }
    if (markerKakao)   { adminMap.removeLayer(markerKakao);   markerKakao = null; }
    if (markerCorrect) { adminMap.removeLayer(markerCorrect); markerCorrect = null; }

    markerCur = L.marker([p.lat, p.lon], {
      icon: L.divIcon({ html: '<div style="width:14px;height:14px;background:#e53935;border:2px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>', className:'', iconSize:[14,14], iconAnchor:[7,7] })
    }).addTo(adminMap).bindPopup(`No.${p.id}<br>${p.label}`).openPopup();
    adminMap.setView([p.lat, p.lon], 17);

    document.getElementById('report-actions').style.display = 'none';
    document.getElementById('review-actions').style.display = 'block';
    document.getElementById('detail-title').textContent = `No.${p.id} · ${p.label}`;
    document.getElementById('detail-info').innerHTML =
      `${p.district} · ${p.road}<br><span style="font-size:11px;color:#999">${p.geocode || ''} · ${p.lat?.toFixed(6)}, ${p.lon?.toFixed(6)}</span>`;
    document.getElementById('rv-cur-link').href =
      `https://map.kakao.com/link/map/${encodeURIComponent(p.label)},${p.lat},${p.lon}`;
    document.getElementById('rv-kakao-link').style.display = 'none';
    document.getElementById('rv-kko-input').value = '';
    document.getElementById('rv-msg').textContent = '';
    document.getElementById('detail-pane').style.display = 'block';

    // submitCorrection에 넘길 수 있도록 형식 맞춤
    const item = { id: p.id, district: p.district, label: p.label, road: p.road, cur_lat: p.lat, cur_lon: p.lon };
    document.getElementById('rv-submit-btn').onclick = () => submitCorrection(item);
  }

  // ── 수정 예약 (localStorage) ──────────────────────────
  let pendingCorrections = {};
  try { pendingCorrections = JSON.parse(localStorage.getItem('pending_corrections') || '{}'); } catch(e) {}

  function savePending() {
    localStorage.setItem('pending_corrections', JSON.stringify(pendingCorrections));
    const count = Object.keys(pendingCorrections).length;
    const badge = document.getElementById('pending-badge');
    badge.textContent = count;
    badge.style.display = count > 0 ? 'inline' : 'none';
    const doneBtn = document.getElementById('pending-done-btn');
    if (doneBtn) doneBtn.style.display = count > 0 ? 'inline-block' : 'none';
  }
  savePending(); // 초기 뱃지 반영

  // ── 전체 핀 탭 ───────────────────────────────────────
  let clLogEntries = []; // Firestore pin_corrections 캐시

  async function loadCorrectionLog() {
    const pane = document.getElementById('list-pane');
    document.getElementById('report-actions').style.display = 'none';
    document.getElementById('review-actions').style.display = 'none';
    document.getElementById('location-fix-ui').style.display = 'none';
    document.getElementById('detail-pane').style.display = 'none';
    pane.innerHTML = '<div class="list-empty">로딩 중...</div>';

    // data.json 로드
    try {
      if (!allPins.length) {
        const res = await fetch('/data.json');
        allPins = await res.json();
      }
    } catch(e) {
      pane.innerHTML = `<div class="list-empty" style="color:#e53935;">data.json 로드 실패<br><small>${e}</small></div>`;
      return;
    }

    // Firestore pin_corrections 이력
    try {
      const snap = await db.collection('pin_corrections').orderBy('correctedAt', 'desc').get();
      clLogEntries = snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
    } catch(e) { clLogEntries = []; }

    document.getElementById('badge-corrections').textContent = allPins.length.toLocaleString();

    renderCorrectionList(allPins, '');
  }

  function renderCorrectionList(pins, query) {
    const pane = document.getElementById('list-pane');
    const filtered = query
      ? pins.filter(p =>
          (p.id && p.id.includes(query)) ||
          (p.label && p.label.toLowerCase().includes(query)) ||
          (p.road  && p.road.toLowerCase().includes(query)) ||
          (p.district && p.district.includes(query)))
      : pins;

    const manualCount = pins.filter(p => p.geocode === 'manual').length;
    const pendingCount = Object.keys(pendingCorrections).length;

    pane.innerHTML = `
      <div class="ps-search-wrap">
        <input type="search" id="cl-input" placeholder="번호·장소명·도로명·자치구 검색..." value="${query}">
      </div>
      <div style="padding:5px 14px 6px;font-size:11px;color:#888;border-bottom:1px solid #f0f0f0;">
        ${query ? `검색결과 <strong>${filtered.length.toLocaleString()}</strong>개 / ` : ''}전체 <strong>${pins.length.toLocaleString()}</strong>개
        &nbsp;·&nbsp; 수정됨 <strong style="color:#2e7d52;">${manualCount}</strong>개
        ${pendingCount > 0 ? `&nbsp;·&nbsp; 예약 <strong style="color:#e65100;">${pendingCount}</strong>개` : ''}
      </div>`;

    document.getElementById('cl-input').addEventListener('input', e => {
      renderCorrectionList(allPins, e.target.value.trim().toLowerCase());
    });

    const frag = document.createDocumentFragment();
    filtered.slice(0, 200).forEach(p => {
      const isManual = p.geocode === 'manual';
      const isPending = !!pendingCorrections[p.id];
      const logs = clLogEntries.filter(e => String(e.pinId) === String(p.id));
      const div = document.createElement('div');
      div.className = 'report-item' + (p.id === selectedId ? ' selected' : '');
      div.innerHTML = `
        <div class="ri-header">
          ${isManual
            ? '<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:#e8f5ee;color:#2e7d52;">수정됨</span>'
            : '<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:#f5f5f5;color:#aaa;">미수정</span>'}
          ${isPending ? '<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:#fff3e0;color:#e65100;">예약됨</span>' : ''}
          ${logs.length ? `<span style="font-size:10px;color:#1565c0;">이력 ${logs.length}건</span>` : ''}
        </div>
        <div class="ri-label" style="margin-top:3px;">No.${p.id} · ${p.label || '-'}</div>
        <div class="ri-sub">${p.district || ''} · ${p.road || ''}</div>`;
      div.addEventListener('click', () => selectCorrectionPin(p, logs));
      frag.appendChild(div);
    });
    if (filtered.length > 200) {
      const note = document.createElement('div');
      note.className = 'ps-hint';
      note.style.cssText = 'padding:10px 14px;font-size:11px;color:#aaa;';
      note.textContent = `검색어를 입력하면 더 보입니다. (${filtered.length - 200}개 더 있음)`;
      frag.appendChild(note);
    }
    pane.appendChild(frag);
  }

  function selectCorrectionPin(p, logs) {
    selectedId = p.id;

    if (markerCur)     { adminMap.removeLayer(markerCur);     markerCur = null; }
    if (markerRef)     { adminMap.removeLayer(markerRef);     markerRef = null; }
    if (markerCorrect) { adminMap.removeLayer(markerCorrect); markerCorrect = null; }

    const iconColor = p.geocode === 'manual' ? '#2e7d52' : '#9e9e9e';
    markerCur = L.marker([p.lat, p.lon], {
      icon: L.divIcon({
        html: `<div style="width:14px;height:14px;background:${iconColor};border:2px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>`,
        className:'', iconSize:[14,14], iconAnchor:[7,7]
      })
    }).addTo(adminMap).bindPopup(`No.${p.id} · ${p.label}`).openPopup();
    adminMap.setView([p.lat, p.lon], 17);

    // 목록 재렌더 (selected 강조)
    document.querySelectorAll('#list-pane .report-item').forEach(el => el.classList.remove('selected'));
    event?.currentTarget?.classList.add('selected');

    // 상세 패널
    document.getElementById('location-fix-ui').style.display = 'none';
    document.getElementById('report-actions').style.display = 'none';
    document.getElementById('review-actions').style.display = 'none';
    document.getElementById('log-actions').style.display = 'block';

    document.getElementById('detail-title').textContent = `No.${p.id} · ${p.label}`;
    document.getElementById('detail-info').innerHTML =
      `${p.district} · ${p.road}<br>` +
      `<span style="font-size:11px;color:#999;">${p.lat?.toFixed(6)}, ${p.lon?.toFixed(6)} · ${p.geocode || ''}</span>`;

    document.getElementById('log-map-link').href =
      `https://map.kakao.com/link/map/${encodeURIComponent(p.label)},${p.lat},${p.lon}`;
    document.getElementById('log-roadview-link').href =
      `https://map.kakao.com/link/roadview/${p.lat},${p.lon}`;
    document.getElementById('log-deploy-link').href =
      `https://seoul-cleanmap.github.io?pin=${p.id}`;

    // 예약 입력 초기화
    const kkoInput = document.getElementById('log-kko-input');
    const pendingMsg = document.getElementById('log-pending-msg');
    kkoInput.value = pendingCorrections[p.id]?.kkoTo || '';
    pendingMsg.style.color = '#e65100';
    pendingMsg.textContent = pendingCorrections[p.id] ? `예약됨: ${pendingCorrections[p.id].kkoTo}` : '';

    document.getElementById('log-reserve-btn').onclick = () => {
      const val = kkoInput.value.trim();
      if (!val.startsWith('http')) {
        pendingMsg.style.color = '#e53935';
        pendingMsg.textContent = 'kko.to 링크를 입력해주세요.';
        return;
      }
      if (val) {
        pendingCorrections[p.id] = { label: p.label, district: p.district, kkoTo: val };
        pendingMsg.style.color = '#e65100';
        pendingMsg.textContent = `✅ 예약됨: ${val}`;
      } else {
        delete pendingCorrections[p.id];
        pendingMsg.textContent = '';
      }
      savePending();
      updateSingleDoneBtn(p);
      renderCorrectionList(allPins, document.getElementById('cl-input')?.value?.trim().toLowerCase() || '');
    };

    updateSingleDoneBtn(p);

    const histEl = document.getElementById('log-history');
    if (!logs.length) {
      histEl.innerHTML = '<div style="font-size:12px;color:#aaa;margin-bottom:8px;">수정 이력 없음</div>';
    } else {
      histEl.innerHTML = logs.map(l => `
        <div style="font-size:11px;background:#f0f7f3;border-radius:8px;padding:7px 10px;margin-bottom:6px;line-height:1.6;">
          <div style="font-weight:700;color:#2e7d52;">${fmtTime(l.correctedAt) || '날짜 미상'}</div>
          <div style="color:#555;">${l.note || '좌표 수정'}</div>
          ${l.oldLat ? `<div style="color:#999;">${(+l.oldLat).toFixed(6)}, ${(+l.oldLon).toFixed(6)} → ${(+l.newLat).toFixed(6)}, ${(+l.newLon).toFixed(6)}</div>` : ''}
          ${l.kkoTo ? `<a href="${l.kkoTo}" target="_blank" style="color:#1565c0;font-size:11px;">kko.to 링크</a>` : ''}
        </div>`).join('');
    }

    document.getElementById('detail-pane').style.display = 'block';
  }

  // 개별 완료 버튼 표시 제어
  function updateSingleDoneBtn(p) {
    const wrap = document.getElementById('log-single-done-wrap');
    const btn  = document.getElementById('log-single-done-btn');
    if (pendingCorrections[p.id]) {
      wrap.style.display = 'block';
      btn.onclick = () => completeSinglePin(p);
    } else {
      wrap.style.display = 'none';
    }
  }

  async function completeSinglePin(p) {
    const btn = document.getElementById('log-single-done-btn');
    btn.disabled = true; btn.textContent = '처리 중...';
    try {
      const entry = pendingCorrections[p.id];
      await db.collection('pin_corrections').add({
        pinId: p.id, pinLabel: p.label || '', district: p.district || '', road: p.road || '',
        newLat: p.lat ?? null, newLon: p.lon ?? null,
        kkoTo: entry.kkoTo, note: 'Claude 수정 반영',
        correctedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      delete pendingCorrections[p.id];
      savePending();
      // 이력 캐시 갱신
      const snap = await db.collection('pin_corrections').orderBy('correctedAt','desc').get();
      clLogEntries = snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
      document.getElementById('log-single-done-wrap').style.display = 'none';
      document.getElementById('log-pending-msg').style.color = '#2e7d52';
      document.getElementById('log-pending-msg').textContent = '✅ 완료 처리됨';
      document.getElementById('log-kko-input').value = '';
      // 이력 섹션 재렌더
      const logs = clLogEntries.filter(e => String(e.pinId) === String(p.id));
      const histEl = document.getElementById('log-history');
      histEl.innerHTML = logs.map(l => `
        <div style="font-size:11px;background:#f0f7f3;border-radius:8px;padding:7px 10px;margin-bottom:6px;line-height:1.6;">
          <div style="font-weight:700;color:#2e7d52;">${fmtTime(l.correctedAt) || '날짜 미상'}</div>
          <div style="color:#555;">${l.note || '좌표 수정'}</div>
          ${l.oldLat ? `<div style="color:#999;">${(+l.oldLat).toFixed(6)}, ${(+l.oldLon).toFixed(6)} → ${(+l.newLat).toFixed(6)}, ${(+l.newLon).toFixed(6)}</div>` : ''}
          ${l.kkoTo ? `<a href="${l.kkoTo}" target="_blank" style="color:#1565c0;font-size:11px;">kko.to 링크</a>` : ''}
        </div>`).join('');
      renderCorrectionList(allPins, document.getElementById('cl-input')?.value?.trim().toLowerCase() || '');
    } catch(e) {
      alert('오류: ' + e.message);
      btn.disabled = false; btn.textContent = '✅ 이 핀 완료 처리';
    }
  }

  // 전체 완료 처리
  document.getElementById('pending-done-btn').addEventListener('click', async function() {
    const entries = Object.entries(pendingCorrections);
    if (!entries.length) return;
    this.disabled = true;
    this.textContent = '처리 중...';
    try {
      const batch = db.batch();
      entries.forEach(([pinId, v]) => {
        const pin = allPins.find(p => p.id === pinId);
        const ref = db.collection('pin_corrections').doc();
        batch.set(ref, {
          pinId,
          pinLabel: v.label || pin?.label || '',
          district: v.district || pin?.district || '',
          road: pin?.road || '',
          newLat: pin?.lat ?? null,
          newLon: pin?.lon ?? null,
          kkoTo: v.kkoTo,
          note: 'Claude 수정 반영',
          correctedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      });
      await batch.commit();
      pendingCorrections = {};
      savePending();
      document.getElementById('log-single-done-wrap').style.display = 'none';
      // 이력 캐시 갱신 후 목록 재렌더
      const snap = await db.collection('pin_corrections').orderBy('correctedAt','desc').get();
      clLogEntries = snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
      renderCorrectionList(allPins, document.getElementById('cl-input')?.value?.trim().toLowerCase() || '');
      this.textContent = '✅ 전체 완료';
      setTimeout(() => { this.textContent = '✅ 전체 완료'; this.disabled = false; }, 1500);
    } catch(e) {
      alert('오류: ' + e.message);
      this.disabled = false;
      this.textContent = '✅ 완료 처리';
    }
  });

  document.getElementById('claude-copy-btn').addEventListener('click', function() {
    const entries = Object.entries(pendingCorrections);
    let text;
    if (entries.length > 0) {
      const lines = entries.map(([id, v]) => `${id}: ${v.kkoTo}  (${v.label})`).join('\n');
      text = `다음 핀들 좌표 수정해줘:\n${lines}`;
    } else {
      text = 'Firestore coord_reviews에 pending 건 전부 반영해줘';
    }
    navigator.clipboard.writeText(text).then(() => {
      const prev = this.innerHTML;
      this.innerHTML = '✅ 복사됨';
      setTimeout(() => { this.innerHTML = prev; }, 2000);
    });
  });
</script>
</body>
</html>
